name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build -- --bundles nsis

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/apple-cert.p12
          openssl pkcs12 -in /tmp/apple-cert.p12 -passin pass:"$APPLE_CERTIFICATE_PASSWORD" -nokeys -clcerts >/dev/null
          npm run tauri build -- --bundles dmg

      - name: Notarize and staple DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          DMG_PATH=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | head -n 1)

          if [ -z "$DMG_PATH" ]; then
            echo "No DMG file found after build"
            exit 1
          fi

          echo "$APPLE_API_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

          echo "Submitting DMG for notarization..."
          SUBMIT_JSON=$(xcrun notarytool submit "$DMG_PATH" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --output-format json)

          SUBMISSION_ID=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["id"])' "$SUBMIT_JSON")
          echo "Notary submission id: $SUBMISSION_ID"

          DEADLINE=$(( $(date +%s) + 7200 ))
          ATTEMPT=0
          LAST_STATUS="In Progress"

          while [ $(date +%s) -lt $DEADLINE ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Polling notary status (attempt $ATTEMPT)..."

            if INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --output-format json 2>/dev/null); then
              LAST_STATUS=$(python3 -c 'import json,sys; print(json.loads(sys.argv[1]).get("status", "Unknown"))' "$INFO_JSON")
              echo "Current status: $LAST_STATUS"

              if [ "$LAST_STATUS" = "Accepted" ]; then
                break
              fi

              if [ "$LAST_STATUS" = "Invalid" ] || [ "$LAST_STATUS" = "Rejected" ]; then
                echo "Notarization failed with status: $LAST_STATUS"
                xcrun notarytool log "$SUBMISSION_ID" \
                  --key "$RUNNER_TEMP/AuthKey.p8" \
                  --key-id "$APPLE_API_KEY_ID" \
                  --issuer "$APPLE_API_ISSUER" || true
                exit 1
              fi
            else
              echo "Transient network/notary API error while polling. Retrying in 20s..."
            fi

            sleep 20
          done

          if [ "$LAST_STATUS" != "Accepted" ]; then
            echo "Notarization did not complete within 60 minutes (last status: $LAST_STATUS)."
            echo "You can rerun the workflow; Apple notary queues are often delayed."
            exit 1
          fi

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

          echo "Validating stapled DMG..."
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vv -t open "$DMG_PATH" || echo "spctl returned non-zero in CI (often 'Insufficient Context'); notarization + stapler validate already passed."

      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri build -- --bundles deb appimage

      - name: Upload bundles (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload bundles (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-macOS
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload bundles (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: bundles-Linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect installers
        run: |
          mkdir -p release-files
          find dist-artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' \) -exec cp {} release-files/ \;
          echo "--- Files to release ---"
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
